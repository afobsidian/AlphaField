<!-- ==================== TAB 1: BUILD ==================== -->
<section id="build-view" class="view-section active">
    <div class="view-header">
        <h1>🔧 Strategy Configuration</h1>
        <p>Choose your trading strategy and asset category for optimization</p>
    </div>

    <div class="build-grid">
        <!-- Strategy Selection Card -->
        <div class="card strategy-card">
            <h3>Select Trading Strategy</h3>
            <div class="strategy-search-container">
                <input
                    type="text"
                    id="strategy-search"
                    placeholder="🔍 Search strategies..."
                    class="form-input"
                    oninput="filterStrategies(this.value)"
                />
            </div>
            <div class="strategy-categories" id="strategy-categories">
                <div class="strategy-loading">Loading strategies…</div>
                <noscript>JavaScript is required to load strategies.</noscript>
            </div>
        </div>

        <!-- Asset Category Selection Card -->
        <div class="card strategy-card">
            <h3>Asset Category</h3>
            <div class="strategy-options">
                <label class="strategy-option">
                    <input
                        type="radio"
                        name="asset-category"
                        value="market"
                        checked
                    />
                    <div class="strategy-info">
                        <span class="strategy-name">📊 Market</span>
                        <span class="strategy-desc">Top 10 by cap</span>
                    </div>
                </label>
                <label class="strategy-option">
                    <input
                        type="radio"
                        name="asset-category"
                        value="large-cap"
                    />
                    <div class="strategy-info">
                        <span class="strategy-name">🏢 Large Cap</span>
                        <span class="strategy-desc">Rank 1-30</span>
                    </div>
                </label>
                <label class="strategy-option">
                    <input type="radio" name="asset-category" value="mid-cap" />
                    <div class="strategy-info">
                        <span class="strategy-name">🔷 Mid Cap</span>
                        <span class="strategy-desc">Rank 31-100</span>
                    </div>
                </label>
                <label class="strategy-option">
                    <input
                        type="radio"
                        name="asset-category"
                        value="small-cap"
                    />
                    <div class="strategy-info">
                        <span class="strategy-name">💎 Small Cap</span>
                        <span class="strategy-desc">Rank 101-300</span>
                    </div>
                </label>
                <label class="strategy-option">
                    <input type="radio" name="asset-category" value="defi" />
                    <div class="strategy-info">
                        <span class="strategy-name">🌐 DeFi</span>
                        <span class="strategy-desc">DeFi protocols</span>
                    </div>
                </label>
            </div>
        </div>

        <!-- ML Enhancement Card -->
        <div>
            <div class="card strategy-card">
                <h3>🤖 ML Enhancement</h3>
                <div class="strategy-options">
                    <label
                        class="strategy-option"
                        style="
                            background: rgba(139, 92, 246, 0.1);
                            border-color: rgba(139, 92, 246, 0.3);
                        "
                    >
                        <input
                            type="checkbox"
                            id="ml-enabled"
                            onchange="toggleMLMode()"
                        />
                        <div class="strategy-info">
                            <span class="strategy-name">Enable ML</span>
                            <span class="strategy-desc"
                                >Train model during optimization</span
                            >
                        </div>
                    </label>
                </div>

                <div
                    id="ml-options"
                    class="hidden"
                    style="
                        margin-top: 12px;
                        padding: 12px;
                        background: rgba(139, 92, 246, 0.05);
                        border-radius: 8px;
                    "
                >
                    <div class="form-group" style="margin-bottom: 12px">
                        <label
                            style="
                                display: block;
                                margin-bottom: 6px;
                                font-weight: 500;
                                font-size: 12px;
                            "
                            >Model Type</label
                        >
                        <select
                            id="ml-model-type"
                            class="form-select"
                            onchange="updateMLModelType(this.value)"
                            style="padding: 8px 12px; font-size: 12px"
                        >
                            <option value="linear">Linear Regression</option>
                            <option value="logistic">
                                Logistic Regression
                            </option>
                            <option value="rf">Random Forest</option>
                        </select>
                    </div>

                    <div class="form-group" style="margin-bottom: 0">
                        <label
                            style="
                                display: block;
                                margin-bottom: 6px;
                                font-weight: 500;
                                font-size: 12px;
                            "
                        >
                            Confidence:
                            <span id="ml-confidence-value">60%</span>
                        </label>
                        <input
                            type="range"
                            id="ml-confidence"
                            min="50"
                            max="90"
                            step="5"
                            value="60"
                            style="width: 100%"
                            onchange="updateMLConfidence(this.value)"
                        />
                    </div>
                </div>
            </div>

            <!-- Trading Mode Card -->
            <div class="card strategy-card" style="margin-top: 16px">
                <h3>💱 Trading Mode</h3>
                <div class="strategy-options">
                    <label class="strategy-option">
                        <input
                            type="radio"
                            name="trading-mode-build"
                            value="Spot"
                            checked
                            id="trading-mode-build-spot"
                            onchange="updateTradingMode('Spot')"
                        />
                        <div class="strategy-info">
                            <span class="strategy-name">📈 Spot Mode</span>
                            <span class="strategy-desc"
                                >Long positions only</span
                            >
                        </div>
                    </label>
                    <label class="strategy-option">
                        <input
                            type="radio"
                            name="trading-mode-build"
                            value="Margin"
                            id="trading-mode-build-margin"
                            onchange="updateTradingMode('Margin')"
                        />
                        <div class="strategy-info">
                            <span class="strategy-name">⚡ Margin Mode</span>
                            <span class="strategy-desc"
                                >Long + Short positions</span
                            >
                        </div>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- Action Button (Full Width) -->
    <div style="margin-top: 24px; text-align: center">
        <button
            type="button"
            class="btn btn-primary btn-action"
            onclick="goToOptimize()"
            style="max-width: 400px"
        >
            Next: Optimize Parameters →
        </button>
    </div>
</section>
