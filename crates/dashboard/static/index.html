<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AlphaField Dashboard</title>

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="style.css" />
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

        <!-- Component Loader Script -->
        <script>
            // Load HTML components
            async function loadComponent(elementId, componentPath) {
                try {
                    const response = await fetch(componentPath);
                    const html = await response.text();
                    document.getElementById(elementId).innerHTML = html;
                } catch (error) {
                    console.error(
                        `Error loading component ${componentPath}:`,
                        error,
                    );
                }
            }

            // Load all components when DOM is ready
            document.addEventListener("DOMContentLoaded", async () => {
                await loadComponent(
                    "navigation-container",
                    "components/navigation.html",
                );
                await loadComponent(
                    "build-container",
                    "components/build-tab.html",
                );
                await loadComponent(
                    "optimize-container",
                    "components/optimize-tab.html",
                );
                await loadComponent(
                    "backtest-container",
                    "components/backtest-tab.html",
                );
                await loadComponent(
                    "deploy-container",
                    "components/deploy-tab.html",
                );
                await loadComponent(
                    "orders-container",
                    "components/orders-tab.html",
                );

                // Initialize app after components are loaded
                if (typeof initializeApp === "function") {
                    initializeApp();
                }
            });
        </script>
    </head>

    <body>
        <div class="app-background">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
        </div>

        <div class="app-container">
            <!-- Navigation Component -->
            <div id="navigation-container"></div>

            <!-- Main Content Area -->
            <main class="main-content">
                <!-- Build Tab -->
                <div id="build-container"></div>

                <!-- Optimize Tab -->
                <div id="optimize-container"></div>

                <!-- Backtest Tab -->
                <div id="backtest-container"></div>

                <!-- Deploy Tab -->
                <div id="deploy-container"></div>

                <!-- Orders Tab -->
                <div id="orders-container"></div>
            </main>
        </div>
        <script src="app.js"></script>
    </body>
</html>
