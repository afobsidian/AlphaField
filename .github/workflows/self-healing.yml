name: Copilot Pipeline Healer

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  heal:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
      models: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0 # Full history for better context

      - name: Fetch Failed Workflow Logs
        id: fetch_logs
        run: |
          echo "Fetching logs from failed run..."
          gh run view ${{ github.event.workflow_run.id }} --log-failed > failure.log || {
            echo "Failed to fetch logs"
            exit 1
          }

          # Validate log file exists and has content
          if [ ! -s failure.log ]; then
            echo "Error: Log file is empty"
            exit 1
          fi

          # Extract error-relevant lines with context
          # Include 3 lines before and 3 lines after each error for file paths and context
          grep -i -B 3 -A 3 -E "error|fail|fatal|exception|✗|×|❌|exit code" failure.log | tail -n 200 > errors_only.log || true

          # If no errors found, take last 200 lines
          if [ ! -s errors_only.log ]; then
            tail -n 200 failure.log > errors_only.log
          fi

          # Reduce to last 150 lines for token limit
          tail -n 150 errors_only.log > final_errors.log

          echo "Filtered log size: $(wc -l < final_errors.log) lines"

          # Output the log content for use in next step using heredoc
          {
            echo 'log_content<<EOF_LOGS'
            cat final_errors.log
            echo 'EOF_LOGS'
          } >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Workflow Context
        id: context
        run: |
          # Gather additional context for better AI analysis
          echo "workflow_name=${{ github.event.workflow_run.name }}" >> $GITHUB_OUTPUT
          echo "branch=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_OUTPUT
          echo "commit=$(git rev-parse HEAD | cut -c1-8)" >> $GITHUB_OUTPUT

          # Get just first line of commit message
          commit_msg=$(git log -1 --pretty=%s | head -c 100)
          echo "commit_message=$commit_msg" >> $GITHUB_OUTPUT

      - name: AI Root Cause Analysis & Fix Generation
        id: ai_fix
        uses: actions/ai-inference@v1
        with:
          model: gpt-4o
          prompt: |
            Analyze this failed CI workflow and provide a fix.

            Context: ${{ steps.context.outputs.workflow_name }} on ${{ steps.context.outputs.branch }}
            Commit: ${{ steps.context.outputs.commit }} - ${{ steps.context.outputs.commit_message }}

            Error logs:
            ${{ steps.fetch_logs.outputs.log_content }}

            PROJECT STRUCTURE (Crucial for accurate file paths):
            This is AlphaField, a Rust Cargo monorepo organized as:
            - crates/core/      - Core types and traits
            - crates/data/      - Data ingestion and storage
            - crates/strategy/  - Technical indicators and strategies
            - crates/backtest/  - Backtesting engine and ML models
            - crates/execution/  - Order execution and risk management
            - crates/dashboard/ - Web UI and API server

            Common file locations within each crate:
            - src/lib.rs        - Main library code
            - src/main.rs       - Binary entry point
            - src/bin/*.rs      - Additional binaries
            - src/*.rs          - Other modules

            IMPORTANT: Always use the full crate path (e.g., crates/strategy/src/lib.rs) NOT guessed paths like src/alphafield/strategy.rs
            The logs will show the actual file paths that failed - use those exact paths.

            If fixable via code, output ONLY shell commands (sed, printf, patch).
            If not fixable via code, output: UNFIXABLE: <reason>
            No explanations, only commands or UNFIXABLE.

      - name: Validate AI Response
        id: validate
        run: |
          response="${{ steps.ai_fix.outputs.response }}"

          if [ -z "$response" ]; then
            echo "AI returned empty response"
            echo "can_fix=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if AI determined issue is unfixable
          if echo "$response" | grep -qi "^UNFIXABLE:"; then
            echo "AI determined issue is not code-fixable"
            echo "can_fix=false" >> $GITHUB_OUTPUT
            reason=$(echo "$response" | sed 's/^UNFIXABLE: //i' | sed 's/^unfixable: //i')
            echo "reason=$reason" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "can_fix=true" >> $GITHUB_OUTPUT

          # Debug: Show raw AI response
          echo "===== RAW AI RESPONSE START ====="
          echo "$response"
          echo "===== RAW AI RESPONSE END ====="

          # Sanitize AI response to remove Markdown formatting, placeholders, and metadata
          echo "Starting sanitization process..."

          # Step 1: Remove GitHub Actions metadata
          step1=$(echo "$response" | sed -E '/^shell:\s*\/usr\/bin\/bash/d')
          echo "After removing GitHub Actions metadata:"
          echo "$step1"

          # Step 2: Remove variable assignment lines (response="...")
          step2=$(echo "$step1" | sed -E '/^\w+=["\x27]/d')
          echo "After removing variable assignments:"
          echo "$step2"

          # Step 3: Remove opening Markdown code block markers
          step3=$(echo "$step2" | sed '1s/^```shell//g; 1s/^```sh//g; 1s/^```bash//g; 1s/^```//g')
          echo "After removing opening code blocks:"
          echo "$step3"

          # Step 4: Remove closing code block markers
          step4=$(echo "$step3" | sed '$s/^```$//')
          echo "After removing closing code blocks:"
          echo "$step4"

          # Step 5: Remove standalone code block markers
          step5=$(echo "$step4" | sed '/^```[a-z]*$/d')
          echo "After removing standalone code blocks:"
          echo "$step5"

          # Step 6: Remove placeholder paths
          step6=$(echo "$step5" | sed 's|path/to/your/file\.rs||g; s|path/to/your/file||g; s|/path/to/file||g')
          echo "After removing placeholder paths:"
          echo "$step6"

          # Step 7: Remove empty lines
          step7=$(echo "$step6" | sed '/^[[:space:]]*$/d')
          echo "After removing empty lines:"
          echo "$step7"

          # Step 8: Filter out placeholder-only commands and echo of variable names
          step8=$(echo "$step7" | grep -vE '^\s*(echo|printf)\s+"?(\s+|TODO|FIXME|placeholder|\$)')
          echo "After filtering placeholder echoes:"
          echo "$step8"

          # Step 9: Filter out comment placeholders
          step9=$(echo "$step8" | grep -vE '^\s*#\s*(TODO|FIXME|placeholder)')
          echo "After filtering comment placeholders:"
          echo "$step9"

          # Step 10: Filter out variable expansions
          step10=$(echo "$step9" | grep -vE '^\s*\$\{')
          echo "After filtering variable expansions:"
          echo "$step10"

          # Final: Only keep lines that look like actual shell commands
          sanitized_response=$(echo "$step10" | grep -E '^\s*(sed|awk|grep|cat|echo|printf|mkdir|touch|chmod|rm|mv|cp|patch|git|cargo|npm|pip|pip3|yarn|make|bash|sh|true|false|exit|:|\.|source|cd)' || echo "")
          echo "Final sanitized response:"
          echo "$sanitized_response"

          # Validate we have actual commands after sanitization
          if [ -z "$sanitized_response" ]; then
            echo "No valid shell commands found after sanitization"
            echo "can_fix=false" >> $GITHUB_OUTPUT
            echo "reason=Sanitization removed all commands - output contained only Markdown formatting or placeholders" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Validate that files referenced in commands exist
          echo "Validating referenced files..."
          missing_files=""

          # Extract file paths from commands (handles multiple patterns)
          while IFS= read -r cmd; do
            [ -z "$cmd" ] && continue

            # Extract file paths from various command patterns
            # For sed -i commands, extract file from end of line
            if echo "$cmd" | grep -qE '^\s*sed\s+-i'; then
              # Extract filename - it's the last space-separated field
              # Handle both quoted patterns: sed -i 'pattern' file or sed -i "pattern" file
              file=$(echo "$cmd" | awk '{print $NF}')
              if [ -n "$file" ] && [ ! -f "$file" ]; then
                # If simple extraction fails, try removing trailing quotes
                file=$(echo "$file" | sed -E "s/['\"]$//")
                if [ -n "$file" ] && [ ! -f "$file" ]; then
                  missing_files="$missing_files $file"
                fi
              fi
            # For other commands with explicit file argument
            elif echo "$cmd" | grep -qE '^\s*(cat|grep|awk|head|tail|diff|patch|mkdir|touch|chmod|rm|mv|cp)'; then
              file=$(echo "$cmd" | awk '{print $NF}')
              if [ -n "$file" ] && [ ! -f "$file" ]; then
                missing_files="$missing_files $file"
              fi
            fi
          done <<< "$sanitized_response"

          if [ -n "$missing_files" ]; then
            echo "The following files referenced in commands do not exist:$missing_files"
            echo "can_fix=false" >> $GITHUB_OUTPUT
            echo "reason=Referenced files do not exist:$missing_files" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "All referenced files exist, proceeding with fix..."

          # Save sanitized commands to file for execution
          echo "Saving sanitized commands to fix_commands.sh..."
          echo "$sanitized_response" > fix_commands.sh
          chmod +x fix_commands.sh

          echo "AI suggested fix commands (from file):"
          cat fix_commands.sh

          echo "Sanitization complete. Valid commands: $(wc -l < fix_commands.sh) lines"

      - name: Apply AI-Generated Fix
        if: steps.validate.outputs.can_fix == 'true'
        run: |
          echo "Applying AI-generated fix..."
          bash -x fix_commands.sh || {
            echo "Fix application failed"
            exit 1
          }

          # Check if any files were modified
          if [ -z "$(git status --porcelain)" ]; then
            echo "No files were modified by the fix"
            exit 1
          fi

          echo "Files modified:"
          git status --short

      - name: Create Remediation PR
        if: steps.validate.outputs.can_fix == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: AI-automated remediation for workflow failure #${{ github.event.workflow_run.id }}"
          branch: ai-heal/run-${{ github.event.workflow_run.id }}
          delete-branch: true
          title: "🤖 AI Remediation: Fix for workflow failure in run #${{ github.event.workflow_run.id }}"
          body: |
            ## 🛠️ Automated Pipeline Repair

            This PR contains an AI-generated fix for the failed workflow run.

            ### Failure Details
            - **Workflow**: ${{ steps.context.outputs.workflow_name }}
            - **Failed Run**: [${{ github.event.workflow_run.id }}](${{ github.event.workflow_run.html_url }})
            - **Branch**: `${{ steps.context.outputs.branch }}`
            - **Commit**: `${{ steps.context.outputs.commit }}`

            ### AI Analysis & Fix
            ${{ steps.ai_fix.outputs.response }}

            ### ⚠️ Review Required
            This is an automated fix. Please carefully review the changes before merging.

            ---
            *Generated by Copilot Pipeline Healer*
          labels: |
            automated-fix
            ai-generated
            needs-review
          draft: true # Create as draft PR for safety

      - name: Comment on Unfixable Issues
        if: steps.validate.outputs.can_fix == 'false' && steps.validate.outputs.reason != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: '${{ steps.context.outputs.commit }}',
              body: `### 🤖 Copilot Pipeline Healer Analysis\n\nThe failed workflow cannot be automatically fixed:\n\n**Reason**: ${{ steps.validate.outputs.reason }}\n\n**Failed Run**: [#${{ github.event.workflow_run.id }}](${{ github.event.workflow_run.html_url }})\n\nManual intervention required.`
            });
